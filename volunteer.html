<!doctype html>
<html lang="en">
<head>
  <!-- shared head from partials/head.html -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Volunteer — AWS Community Day Ghana 2026 — Accra · 29 August</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <meta property="og:title" content="AWS Community Day Ghana 2026 — Accra · 29 August" />
  <meta property="og:description" content="A community-led day of cloud, AI, and engineering in Accra. Organised by AWS User Group Accra." />
  <meta property="og:image" content="/downloads/aws-community-day-accra-B.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/downloads/aws-community-day-accra-B.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #FAF6EE; color: #1a1410; -webkit-font-smoothing: antialiased; }
    ::selection { background: #C44536; color: #fff; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-33.333%); } }
    @keyframes weave-drift { from { transform: translate(0,0); } to { transform: translate(48px,48px); } }
    @keyframes reveal-in { from { opacity:0; transform: translateY(18px);} to {opacity:1; transform:none;} }
    @media (prefers-reduced-motion: reduce){ *,*::before,*::after{animation:none!important;transition:none!important} .reveal{opacity:1!important;transform:none!important} }
    @media (max-width: 980px){
      .nav-links,.nav-cta{display:none!important}
      .mobile-toggle{display:block!important}
      .footer-grid{grid-template-columns:1fr 1fr!important}
    }
    @media (max-width: 600px){
      section{padding-left:24px!important;padding-right:24px!important}
      nav{padding-left:20px!important;padding-right:20px!important}
      .footer-grid{grid-template-columns:1fr!important}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script type="text/babel" src="site-core.jsx"></script>
  <script type="text/babel" src="page-volunteer.jsx"></script>
  <script type="text/babel">
    const { Nav, MobileMenu, Footer, NotifyModal } = window;
    const { VolunteerPage } = window;
    function App(){
      const [mobileOpen,setMobileOpen]=React.useState(false);
      const [notifyOpen,setNotifyOpen]=React.useState(false);
      return (<div>
        <Nav onRegister={()=>setNotifyOpen(true)} onMobileToggle={()=>setMobileOpen(!mobileOpen)} mobileOpen={mobileOpen} darkHero={true} active="/volunteer.html" />
        <MobileMenu open={mobileOpen} onClose={()=>setMobileOpen(false)} onRegister={()=>setNotifyOpen(true)} />
        <VolunteerPage />
        <Footer />
        <NotifyModal open={notifyOpen} onClose={()=>setNotifyOpen(false)} />
      </div>);
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
