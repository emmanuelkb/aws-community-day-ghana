<head>
<meta charset="utf-8" />

<meta name="description" content="AWS Community Day Ghana 2026 — a community-led day of cloud, AI, and engineering in Accra on Saturday 29 August 2026. Organised by AWS User Group Accra." />
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<meta property="og:title" content="AWS Community Day Ghana 2026 — Accra · 29 August" />
<meta property="og:description" content="A community-led day of cloud, AI, and engineering in Accra. Organised by AWS User Group Accra." />

<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: #1F2A3D; color: #1a1410; -webkit-font-smoothing: antialiased; }
  ::selection { background: #C44536; color: #fff; }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-33.333%); } }
  @keyframes weave-drift { from { transform: translate(0, 0); } to { transform: translate(48px, 48px); } }
  @keyframes reveal-up { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }
  @media (max-width: 980px) {
    .nav-links { display: none !important; }
    .nav-cta { display: none !important; }
    .mobile-toggle { display: block !important; }
    .about-grid, .venue-grid, .org-grid, .cfp-grid, .keynote-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .expect-grid, .crew-grid { grid-template-columns: 1fr 1fr !important; }
    .tracks-grid, .speakers-grid { grid-template-columns: 1fr !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; }
    .sponsor-row { grid-template-columns: 1fr 1fr !important; }
    .hero-meta-band { grid-template-columns: 1fr 1fr !important; }
    .agenda-row { grid-template-columns: 70px 1fr auto !important; gap: 14px !important; }
  }
  @media (max-width: 600px) {
    section { padding-left: 24px !important; padding-right: 24px !important; }
    nav { padding-left: 20px !important; padding-right: 20px !important; }
    .expect-grid, .crew-grid { grid-template-columns: 1fr !important; }
    nav img { height: 40px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="site-core.jsx"></script>
<script type="text/babel" src="site-hero.jsx"></script>
<script type="text/babel" src="site-program.jsx"></script>
<script type="text/babel" src="site-rest.jsx"></script>

<script type="text/babel">
const { Nav, MobileMenu } = window;
const { Hero, HeroMarquee, About, WhatToExpect, Tracks } = window;
const { WhyAttend, Speakers, Agenda, CFP } = window;
const { Sponsors, Venue, Community, Crew, FAQ, Newsletter, Footer, NotifyModal } = window;

function App() {
  const [notifyOpen, setNotifyOpen] = React.useState(false);
  const [mobileOpen, setMobileOpen] = React.useState(false);
  const notify = () => setNotifyOpen(true);

  return (
    <div>
      <Nav onRegister={notify} onMobileToggle={() => setMobileOpen(!mobileOpen)} mobileOpen={mobileOpen} darkHero={true} />
      <MobileMenu open={mobileOpen} onClose={() => setMobileOpen(false)} onRegister={notify} />

      <Hero onNotify={notify} />
      <HeroMarquee />
      <About />
      <WhatToExpect />
      <Tracks />
      <WhyAttend />
      <Speakers />
      <Agenda />
      <CFP />
      <Sponsors />
      <Venue />
      <Community />
      <Crew />
      <FAQ />
      <Newsletter onNotify={notify} />
      <Footer />

      <NotifyModal open={notifyOpen} onClose={() => setNotifyOpen(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
